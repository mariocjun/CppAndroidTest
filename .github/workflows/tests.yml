name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Host build of tests/. No Android NDK involved — these tests cover the
  # platform-agnostic pieces of the bench harness (bench::Json, the
  # Benchmark<T> concept on the registry tuple). Android-specific code
  # (sensors, camera, sysfs readers, NEON intrinsics) is integration-tested
  # by the smoke workflow on an emulator.
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests (host)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-17 lld-17
          # Use Clang 17 explicitly — matches the NDK r26b toolchain, so any
          # behavioural difference between host tests and Android targets is
          # not due to compiler version skew.

      - name: Configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S tests -B tests/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build tests/build --parallel

      - name: Run ctest
        working-directory: tests/build
        run: ctest --output-on-failure --no-tests=error

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-output
          path: tests/build/Testing/
          if-no-files-found: ignore
