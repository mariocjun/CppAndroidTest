name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Cyclomatic complexity + lines-per-function + parameter count via lizard.
  # Lizard is pure Python so this is a 30-second job — runs on every push.
  # Thresholds are deliberate engineering choices:
  #   -C 18  cyclomatic complexity per function (the McCabe definition; >15 is
  #          generally "hard to test", >25 "unmaintainable"). Bench inner loops
  #          legitimately pile up #if guards, hence 18.
  #   -L 100 lines per function. Anything bigger should be split.
  #   -a 6   parameter count. Sensor/camera structs have ~5 fields max in our
  #          API, so 6 is enough headroom without rubber-stamping bloat.
  # ---------------------------------------------------------------------------
  lizard:
    name: Cyclomatic complexity (lizard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lizard
        run: pip install lizard

      - name: Run lizard (human-readable)
        run: |
          mkdir -p reports
          lizard \
            -l cpp \
            -C 18 \
            -L 100 \
            -a 6 \
            app/src/main/cpp/bench \
            app/src/main/cpp/main.cpp \
            | tee reports/lizard.txt

      - name: Run lizard (XML for tooling)
        if: always()
        run: |
          lizard \
            -l cpp \
            -C 18 \
            -L 100 \
            -a 6 \
            --xml \
            app/src/main/cpp/bench \
            app/src/main/cpp/main.cpp \
            > reports/lizard.xml || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lizard-report
          path: reports/

  # ---------------------------------------------------------------------------
  # clang-tidy over the bench code, driven by compile_commands.json from a
  # configure-only CMake pass with the NDK toolchain. We don't build the
  # binary here — clang-tidy reads the source via the compile commands, which
  # is dramatically faster than building first.
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Configure CMake (export compile_commands.json)
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
        run: |
          cmake -S app/src/main/cpp -B build/tidy \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DANDROID_STL=c++_static \
            -DBUILD_BENCH_EXECUTABLE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Locate clang-tidy from NDK
        id: tidy
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
        run: |
          TIDY="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang-tidy"
          if [ ! -x "$TIDY" ]; then
            echo "::error::clang-tidy not found at $TIDY"
            ls -la "$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep tidy || true
            exit 1
          fi
          echo "tidy=$TIDY" >> "$GITHUB_OUTPUT"
          "$TIDY" --version

      - name: Run clang-tidy on bench/
        run: |
          mkdir -p reports
          # Limit to bench/ — main.cpp is mostly NDK-glue boilerplate that
          # would just produce noisy 'pro-bounds' warnings.
          SOURCES=$(find app/src/main/cpp/bench -name '*.cpp' | sort)
          echo "Analysing $(echo "$SOURCES" | wc -l) sources..."
          set +e
          "${{ steps.tidy.outputs.tidy }}" \
            -p build/tidy \
            --quiet \
            $SOURCES \
            > reports/clang-tidy.txt 2>&1
          rc=$?
          set -e
          echo "::group::clang-tidy diagnostics"
          cat reports/clang-tidy.txt
          echo "::endgroup::"
          # clang-tidy returns nonzero whenever it emits any diagnostic.
          # We treat this as informational, not gating — the build itself
          # enforces the hard warnings via -Werror=. CI keeps going.
          echo "clang-tidy exit code (informational): $rc"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: reports/
