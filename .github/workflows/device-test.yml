name: Physical device test (N975F)

# Runs the cppbench suite on the REAL rooted SM-N975F (Exynos 9825) via a
# self-hosted runner on the dev PC. This is the "official physical tester":
# root unlocks PMU counters + cpufreq governor pinning that the GitHub-hosted
# x86_64 emulator (and the unrooted S24 Ultra) can't provide.
#
# ⚠️ SECURITY — this repo is PUBLIC and self-hosted runners on public repos are
# risky (a fork PR could run code on the runner machine). This workflow is
# therefore restricted to triggers only the repository OWNER can fire:
#   - workflow_dispatch (manual, from the Actions tab)
#   - release: published (creating a release — owner action)
# There is deliberately NO pull_request / push trigger, so fork PRs can never
# schedule a job on the self-hosted runner. The owner guard below is a second
# line of defence.

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "cppbench filter (empty = default suite)"
        required: false
        default: ""
      runs:
        description: "number of runs to aggregate (median/CV)"
        required: false
        default: "7"
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: device-test-n975f      # the physical device is a singleton resource
  cancel-in-progress: false     # never interrupt a flash/bench mid-cycle

jobs:
  bench-on-device:
    # Second line of defence on top of the owner-only triggers above.
    if: github.repository_owner == 'mariocjun'
    runs-on: [self-hosted, n975f]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Device probe (read-only)
        shell: bash
        run: bash scripts/device-harness.sh probe REDACTED_SERIAL

      - name: Build/resolve cppbench for the device
        shell: bash
        env:
          # On the self-hosted runner, the NDK is at the dev PC's SDK path.
          # If absent, device-harness.sh falls back to the latest release asset.
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
        run: |
          # Prefer the freshly-tagged release asset matching this run; the
          # harness auto-downloads the latest cppbench-*-arm64-v8a if needed.
          bash scripts/device-harness.sh root REDACTED_SERIAL

      - name: Run benchmark suite (root, performance governor, N runs)
        shell: bash
        run: |
          FILTER='${{ github.event.inputs.filter }}'
          RUNS='${{ github.event.inputs.runs }}'
          RUNS="${RUNS:-7}"
          bash scripts/device-harness.sh full-stats REDACTED_SERIAL "$FILTER" "$RUNS"

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n975f-bench-${{ github.run_id }}
          path: results/*.json
          if-no-files-found: warn
