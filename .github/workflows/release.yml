name: Build and Release APK + cppbench

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write      # to dispatch the device-test workflow after a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build standalone cppbench (arm64-v8a)
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
        run: bash scripts/build-bench.sh

      - name: Stage release artifacts
        run: |
          mkdir -p artifacts
          # Tagged APK — installable. minSdk=29 (Android 10+).
          cp app/build/outputs/apk/release/app-release.apk \
             "artifacts/CppAndroidTest-${GITHUB_REF_NAME}.apk"
          # Standalone bench ELF — push to /data/local/tmp/ on any rooted
          # OR unrooted Android device with USB debugging, no APK install.
          # Stripped to keep the asset small (~200 KB instead of ~2 MB).
          cp build/bench-arm64/cppbench "artifacts/cppbench-${GITHUB_REF_NAME}-arm64-v8a"
          "${ANDROID_SDK_ROOT}/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" \
              "artifacts/cppbench-${GITHUB_REF_NAME}-arm64-v8a" || true
          ls -la artifacts/
          file artifacts/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CppAndroidTest-${{ github.ref_name }}
          path: artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Assets

            - **`CppAndroidTest-${{ github.ref_name }}.apk`** — installable NativeActivity demo.
              Min SDK: 29 (Android 10+). Signed with the Android debug keystore — installs on
              any device with "Install from unknown sources" enabled. Not Play-Store eligible.

            - **`cppbench-${{ github.ref_name }}-arm64-v8a`** — standalone ARM64 ELF binary.
              No APK install needed. Pushes via:

              ```bash
              adb push cppbench-${{ github.ref_name }}-arm64-v8a /data/local/tmp/cppbench
              adb shell chmod 755 /data/local/tmp/cppbench
              adb shell /data/local/tmp/cppbench --json
              adb shell /data/local/tmp/cppbench --sensors
              adb shell /data/local/tmp/cppbench --cameras
              # Live dashboard:
              adb shell /data/local/tmp/cppbench --stream | python scripts/dashboard.py
              ```

              See [CLAUDE.md](https://github.com/${{ github.repository }}/blob/main/CLAUDE.md)
              for the full CLI surface and benchmark catalogue.

      # Deterministic chain to the physical-device tester. We dispatch
      # device-test explicitly (rather than relying on on:release — which
      # GITHUB_TOKEN can't fire — or workflow_run — which proved flaky)
      # only for real tag releases.
      - name: Trigger physical device test (N975F)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run device-test.yml --repo "${{ github.repository }}" \
            -f filter="" -f runs=7 \
            && echo "dispatched device-test.yml for ${{ github.ref_name }}"
